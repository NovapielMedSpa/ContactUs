<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novapiel - Select Language</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
         margin: 0; padding: 0; height: 100vh;
         display: flex; flex-direction: column; justify-content: center; align-items: center;
         background: linear-gradient(135deg, #004aad 0%, #cb6ce6 100%);
         font-family: 'Montserrat', sans-serif; color: white; text-align: center;
         overflow: hidden;
        }
        h1 { font-size: 2.2rem; margin-bottom: 5px; font-weight: 700; }
        p { font-size: 1rem; margin-bottom: 25px; opacity: 0.9; }
        .btn-group { display: flex; flex-direction: column; gap: 15px; align-items: center; }
        .btn-lang { background: white; color: #004aad; text-decoration: none; padding: 15px 40px; border-radius: 50px; font-weight: 700; width: 200px; transition: 0.3s; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .btn-lang:hover { transform: scale(1.05); }
    </style>
</head>
<body>
    <div class="container">
        <h1>Contact Us</h1>
        <p>Select your language / Selecciona tu idioma</p>
        <div class="btn-group">
            <a href="es.html" class="btn-lang">Español</a>
            <a href="en.html" class="btn-lang">English</a>
        </div>
    </div>
</body>
</html>
